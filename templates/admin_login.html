<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 24px;
      box-sizing: border-box;
    }
    h1 {
      margin: 0 0 16px 0;
      font-size: 22px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #9ca3af;
      font-size: 14px;
    }
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #374151;
      border-radius: 8px;
      background: #0b1220;
      color: #f9fafb;
      box-sizing: border-box;
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 8px;
      padding: 10px 12px;
      background: #2563eb;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    .error {
      margin-top: 8px;
      color: #fca5a5;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Admin Login</h1>
    <form method="post" action="/admin-login">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" required />
      <button type="submit">Sign In</button>
    </form>
    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}
  </div>
</body>
</html>
