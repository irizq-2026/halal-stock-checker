[theme]
primaryColor = "#C9A84C"
backgroundColor = "#0D1B2A"
secondaryBackgroundColor = "#1A2B3C"
textColor = "#F5F5F5"
font = "sans serif"

[server]
maxUploadSize = 5
enableCORS = false
enableXsrfProtection = false
enableWebsocketCompression = false
headless = true
fileWatcherType = "none"

[browser]
gatherUsageStats = false
