services:
  - type: web
    name: halal-stock-checker
    runtime: python
    buildCommand: pip install -r requirements.txt && mkdir -p bin && curl -fsSL https://github.com/caddyserver/caddy/releases/download/v2.8.4/caddy_2.8.4_linux_amd64.tar.gz | tar -xz -C bin caddy && chmod +x bin/caddy
    startCommand: bash start.sh
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: SENDER_EMAIL
        sync: false
      - key: SENDER_NAME
        sync: false
  - type: cron
    name: nightly-price-update
    runtime: python
    schedule: "0 2 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python jobs/nightly_price_update.py
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CRON_SECRET
        sync: false
